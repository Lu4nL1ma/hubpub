{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Form-Divulgação</title>
    <link rel="stylesheet" href="{% static 'css/frm-agd.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <a href="{% url 'agenda' %}" class="btn-back">
        <i class="fas fa-arrow-left"></i> Voltar
    </a>

    <div class="form-container">
        <div class="form-header">
            <h2>INFINITY <span>DIVULGAÇÃO</span></h2>
            <p style="color: var(--cor-suave); margin-top: 5px;">Cadastro de Dados e Mídia</p>
        </div>

        <form action="{% url 'forms_agenda' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label for="curs"> Curso </label>
                <select name="curs" id="curs">
                    {% for tc in todos_cursos %}
                        <option value="{{ tc.curso }}"> {{ tc.curso }} </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label for="rede_social"> Rede Social </label>
                <select name="rede_social" id="rede_social">
                    {% for r in redes %}
                        <option value="{{ r }}"> {{ r }} </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="tipo"> Tipo de Publicação </label>
                <select name="tipo" id="tipo">
                    {% for t in tipos %}
                        <option value="{{ t }}"> {{ t }} </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label for="data_pub"> Data de Divulgação </label>
                    <input type="date" id="data_pub" name="data_pub" required>
                </div>

                <div class="form-group" style="flex: 1;">
                    <label for="hora_pub"> Hora </label>
                    <input type="time" id="hora_pub" name="hora_pub" required>
                </div>
            </div>

            <div class="form-group" style="margin-top: 10px;">
                <label class="checkbox-container">
                    <input type="checkbox" id="check-repetir">
                    <span class="checkmark"></span>
                    Agendar uma repetição para outra data?
                </label>
            </div>
            <div id="wrapper-repeticao" class="form-group field-animated">
                <label for="data_rep"> <i class="fas fa-calendar-plus"></i> Nova Data de Repetição </label>
                <input type="date" id="data_rep" name="data_rep">
            </div>

            <button type="submit" class="btn-submit">Salvar Registro</button>
        </form>

        <div class="form-footer">
            <p>© 2026 Infty Proj - Sistema de Gestão</p>
        </div>
    </div>

    <script>
        // Lógica para mostrar/esconder o campo de repetição
        const checkbox = document.getElementById('check-repetir');
        const wrapper = document.getElementById('wrapper-repeticao');
        const inputRep = document.getElementById('data_rep');

        checkbox.addEventListener('change', function() {
            if(this.checked) {
                wrapper.style.display = 'block';
                inputRep.setAttribute('required', 'required');
            } else {
                wrapper.style.display = 'none';
                inputRep.removeAttribute('required');
                inputRep.value = '';
            }
        });
    </script>
</body>
</html>
