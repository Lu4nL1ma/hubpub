{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chamada | {{ curso.curso }}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/pres_styl.css' %}">
</head>
<body class="main-content">

    <form method="POST">
        {% csrf_token %}
        
        <nav class="hub-navbar">
            <a href="{% url 'detalhe_curso' curso.id %}" class="nav-link">
                <i class="fas fa-chevron-left"></i> VOLTAR
            </a>
            
            <div class="nav-title">
                <h2>Chamada <span>Diária</span></h2>
                <small>{{ curso.curso }}</small>
            </div>

            <div class="nav-actions">
                <div class="date-wrapper">
                    <i class="far fa-calendar-alt"></i>
                    <input type="date" name="data_presenca" value="{{ hoje }}" class="input-date-nav">
                </div>
                <button type="submit" class="btn-save">
                    <i class="fas fa-check-double"></i> SALVAR
                </button>
            </div>
        </nav>

        <div class="attendance-container">
            <div class="attendance-header">
                <h3>Lista de Alunos <span>({{ alunos.count }})</span></h3>
                <p>Toque no card para alternar entre Presente e Ausente</p>
            </div>

            <div class="attendance-grid">
                {% for a in alunos %}
                <label class="attendance-card">
                    <input type="checkbox" name="aluno_{{ a.id }}" checked class="attendance-input">
                    <div class="card-content">
                        <div class="student-avatar">
                            <i class="fas fa-user-graduate"></i>
                        </div>
                        <div class="student-details">
                            <span class="student-name">{{ a.nome }}</span>
                            <span class="status-label">Presente</span>
                        </div>
                        <div class="status-indicator">
                            <div class="toggle-dot"></div>
                        </div>
                    </div>
                </label>
                {% empty %}
                <div class="empty-state">
                    <i class="fas fa-users-slash"></i>
                    <p>Nenhum aluno matriculado para este curso.</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </form>

</body>
</html>
