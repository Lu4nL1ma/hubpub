{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Cursos | Infty Proj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/hub-style.css' %}"> 
</head>
<body class="main-content">

    <nav class="hub-navbar">
        <a href="{% url 'eixo' %}" class="nav-link">
            <i class="fas fa-arrow-left"></i> VOLTAR
        </a>
        
        <div class="nav-title">
            <h2>Gestão de <span>Cursos</span></h2>
        </div>

        <div class="nav-actions">
            <a href="{% url 'cadastrar_curso' %}" class="btn-new-small">
                <i class="fas fa-plus"></i> NOVO CURSO
            </a>
        </div>
    </nav>

    <div class="hub-grid">
        {% for c in cursos %}
        <a href="{% url 'detalhe_curso' c.id %}" style="text-decoration: none; color: inherit;">
            <div class="hub-card">
                <div class="card-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h3>{{ c.curso }}</h3>
                <p><strong>Turno:</strong> {{ c.turno }}</p>
                
                <div class="progress-container">
                    <div class="progress-bar" style="width: {% widthratio c.inscritos c.vagas 100 %}%"></div>
                </div>
                
                <p>{{ c.inscritos }} / {{ c.vagas }} Inscritos</p>
                <p><i class="far fa-calendar-alt"></i> Início: {{ c.data_inicio|date:"d/m/Y" }}</p>
            </div>
        </a>
        {% empty %}
        <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
            <p style="color: var(--cor-suave)">Nenhum curso cadastrado no momento.</p>
        </div>
        {% endfor %}
    </div>

</body>
</html>
