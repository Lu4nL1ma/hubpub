{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Cursos | Infty Proj</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/hub-style.css' %}"> 
</head>
<body class="main-content">

    <div class="header-staff">
        <h2>GESTÃO DE <span>CURSOS</span></h2>
        <a href="{% url 'cadastrar_curso' %}" class="btn-hub" style="text-decoration: none;">
            <i class="fas fa-plus"></i> NOVO CURSO
        </a>
    </div>

    <div class="hub-grid">
        {% for c in cursos %}
        <a href="{% url 'detalhe_curso' c.id %}" style="text-decoration: none; color: inherit;">
            <div class="hub-card">
                <div class="card-icon">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h3>{{ c.curso }}</h3>
                <p><strong>Turno:</strong> {{ c.turno }}</p>
                
                <div style="width: 100%; background: #0a0f1e; border-radius: 5px; margin: 15px 0;">
                    <div style="width: {% widthratio c.inscritos c.vagas 100 %}%; background: var(--cor-acento); height: 8px; border-radius: 5px;"></div>
                </div>
                
                <p>{{ c.inscritos }} / {{ c.vagas }} Inscritos</p>
                <p><i class="far fa-calendar-alt"></i> Início: {{ c.data_inicio|date:"d/m/Y" }}</p>
            </div>
        </a>
        {% empty %}
        <p style="color: var(--cor-suave)">Nenhum curso cadastrado no momento.</p>
        {% endfor %}
    </div>

</body>
</html>
