{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Form-Divulgação | Infty Proj</title>
    
    <link rel="stylesheet" href="{% static 'css/frm-agd.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
</head>
<body>

    <a href="{% url 'agenda' %}" class="btn-back">
        <i class="fas fa-arrow-left"></i> Voltar
    </a>

    <div class="form-container">
        <div class="form-header">
            <h2>INFINITY <span>DIVULGAÇÃO</span></h2>
            <p style="color: var(--cor-suave); margin-top: 5px;">Cadastro de Dados e Mídia</p>
        </div>

        <form action="{% url 'forms_agenda' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="form-group">
                <label for="curs"><i class="fas fa-search"></i> Pesquisar ou Selecionar Curso</label>
                <select name="curs" id="curs" required>
                    <option value=""></option> {% for tc in todos_cursos %}
                        <option value="{{ tc.curso }}" 
                                data-legenda="{{ tc.legenda }}" 
                                data-midia="{% if tc.midia_post %}{{ tc.midia_post.url }}{% else %}Não Especificado{% endif %}"> 
                            {{ tc.curso }} 
                        </option>
                    {% endfor %}
                </select>
            </div>

            <input type="hidden" id="hidden_legenda" name="legenda">
            <input type="hidden" id="hidden_midia" name="midia">
            
            <div class="form-group">
                <label for="rede_social"> Rede Social </label>
                <select name="rede_social" id="rede_social" required>
                    {% for r in redes %}
                        <option value="{{ r }}"> {{ r }} </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="tipo"> Tipo de Publicação </label>
                <select name="tipo" id="tipo" required>
                    {% for t in tipos %}
                        <option value="{{ t }}"> {{ t }} </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-row">
                <div class="form-group" style="flex: 2;">
                    <label for="data_pub"> Data de Divulgação </label>
                    <input type="date" id="data_pub" name="data_pub" required>
                </div>

                <div class="form-group" style="flex: 1;">
                    <label for="hora_pub"> Hora </label>
                    <input type="time" id="hora_pub" name="hora_pub" required>
                </div>
            </div>

            <div class="form-group" style="margin-top: 10px;">
                <label class="checkbox-container">
                    <input type="checkbox" id="check-repetir">
                    Agendar uma repetição para outra data?
                </label>
            </div>

            <div id="wrapper-repeticao" class="form-group field-animated" style="display: none;">
                <label for="data_rep"> <i class="fas fa-calendar-plus"></i> Nova Data de Repetição </label>
                <input type="date" id="data_rep" name="data_rep">
            </div>

            <button type="submit" class="btn-submit">Salvar Registro</button>
        </form>

        <div class="form-footer">
            <p>© 2026 Infty Proj - Sistema de Gestão</p>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        $(document).ready(function() {
            // Inicializa o Select2 corretamente fora de funções
            $('#curs').select2({
                placeholder: "Pesquisar curso...",
                allowClear: true,
                width: '100%'
            });

            // Dispara a função de preencher quando o Select2 mudar
            $('#curs').on('select2:select', function (e) {
                preencherDadosAutomaticos(this);
            });
        });

        // Lógica da Repetição
        const checkbox = document.getElementById('check-repetir');
        const wrapper = document.getElementById('wrapper-repeticao');
        const inputRep = document.getElementById('data_rep');

        checkbox.addEventListener('change', function() {
            if(this.checked) {
                wrapper.style.display = 'block';
                inputRep.setAttribute('required', 'required');
            } else {
                wrapper.style.display = 'none';
                inputRep.removeAttribute('required');
                inputRep.value = '';
            }
        });

        // Lógica de Captura de Dados
        function preencherDadosAutomaticos(selectElement) {
            const selectedOption = selectElement.options[selectElement.selectedIndex];
            const legenda = selectedOption.getAttribute('data-legenda');
            const midia = selectedOption.getAttribute('data-midia');

            document.getElementById('hidden_legenda').value = legenda || '';
            document.getElementById('hidden_midia').value = midia || 'Não Especificado';

            console.log("Dados carregados: ", legenda);
        }
    </script>
</body>
</html>
