{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/agd.css' %}">
    <title>Agenda de Divulgação | Infty Proj</title>
</head>
<body>
    
    <nav class="hub-navbar">
        <a href="{% url 'staff' %}" class="nav-link">
            <i class="fas fa-arrow-left"></i> VOLTAR
        </a>
        
        <div class="nav-title">
            <h2 id="monthDisplay">Mês <span>Ano</span></h2>
        </div>

        <div class="nav-actions">
            <button class="btn-nav-circle" onclick="changeWeek(-7)" title="Semana Anterior">
                <i class="fas fa-chevron-left"></i>
            </button>
            <button class="btn-nav-circle" onclick="changeWeek(7)" title="Próxima Semana">
                <i class="fas fa-chevron-right"></i>
            </button>
            
            <a href="{% url 'forms_agenda' %}" class="btn-new-small">
                <i class="fas fa-plus"></i> INSERIR
            </a>
        </div>
    </nav>

    <div class="week-container" id="weekContainer"></div>

    <script id="planner-data" type="application/json">
        {{ db_demandas_json|safe }}
    </script>

    <script>
        // Captura os dados da tag acima
        const dbDemandas = JSON.parse(document.getElementById('planner-data').textContent) || {};
    </script>

    <script src="{% static 'js/agd.js' %}"></script>

</body>
</html>
